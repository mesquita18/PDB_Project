<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/webp" href='/static/css/images/image_scholar_04.webp'>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style_3.css' %}">
    <link rel="stylesheet" href="{% static 'css/toast.css' %}">
    <title>Editar Disciplina</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url("{% static 'css/images/image_scholar.webp' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 100%;
        }

        .form-container h1 {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #007bff;
            text-align: center;
        }

        .form-container label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .form-container input,
        .form-container select {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
        }

        .form-container input:focus,
        .form-container select:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .button-group button,
        .button-group a {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .btn-save {
            background-color: #28a745;
            color: white;
        }

        .btn-save:hover {
            background-color: #218838;
        }

        .btn-cancel {
            background-color: #6c757d;
            color: white;
        }

        .btn-cancel:hover {
            background-color: #5a6268;
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .info-box {
            background-color: #e7f3ff;
            border-left: 4px solid #007bff;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <!-- Django Messages (invisible container para toast) -->
    {% if messages %}
        <div id="django-messages" style="display: none;">
            {% for message in messages %}
                <li data-type="{% if message.tags %}{{ message.tags }}{% else %}info{% endif %}">{{ message }}</li>
            {% endfor %}
        </div>
    {% endif %}

    <div class="form-container">
        <h1><i class="fas fa-edit"></i> Editar Disciplina</h1>
        
        {% if erro %}
            <div class="alert alert-danger">{{ erro }}</div>
        {% endif %}

        <div class="info-box">
            <strong>Código:</strong> {{ disciplina.cod_disciplina }}
        </div>

        <form method="POST">
            {% csrf_token %}
            
            <label for="nome_disciplina">Nome da Disciplina</label>
            <input type="text" id="nome_disciplina" name="nome_disciplina" value="{{ disciplina.nome_disciplina }}" required>
            
            <label for="carga_horaria">Carga Horária</label>
            <input type="number" id="carga_horaria" name="carga_horaria" value="{{ disciplina.carga_horaria }}" required>
            
            <label for="periodo">Período</label>
            <input type="text" id="periodo" name="periodo" value="{{ disciplina.periodo }}" placeholder="ex: 1, 2, 3..." required>
            
            <div class="button-group">
                <button type="submit" class="btn-save"><i class="fas fa-check"></i> Salvar</button>
                <a href="{% url 'listar_disciplinas' %}" class="btn-cancel"><i class="fas fa-times"></i> Cancelar</a>
            </div>
        </form>
    </div>
    
    <script src="{% static 'js/toast.js' %}"></script>
</body>
</html>
